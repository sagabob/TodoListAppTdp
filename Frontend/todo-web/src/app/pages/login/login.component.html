<div class="flex min-h-screen items-center justify-center bg-slate-100 px-4">
  <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-lg">
    <h1 class="text-2xl font-semibold text-slate-900">Sign in</h1>
    <p class="mt-2 text-sm text-slate-600">Login to access your todo list.</p>

    <div class="mt-6 space-y-4">
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700" for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          autocomplete="email"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
          placeholder="you@example.com"
        />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700" for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          autocomplete="current-password"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
          placeholder="Password"
        />
      </div>

      @if (message()) {
        <p
          class="rounded-lg px-3 py-2 text-sm"
          [class.bg-red-50]="isError()"
          [class.text-red-700]="isError()"
        >
          {{ message() }}
        </p>
      }

      <button
        type="button"
        class="w-full rounded-lg bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="isSubmitting()"
        (click)="login()"
      >
        {{ isSubmitting() ? 'Please wait...' : 'Login' }}
      </button>
    </div>

    <p class="mt-6 rounded-lg bg-slate-50 px-3 py-2 text-xs text-slate-600">
      Demo account: <strong>demo@test.com</strong> / <strong>Password123!</strong>
    </p>
  </div>
</div>
